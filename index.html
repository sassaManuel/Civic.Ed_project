<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario World - Civic Ed</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="mario">
        <img src="sassamanuel.png" alt="Mario" width="64" height="92">
    </div>
    <div class="sun"></div>
    <div class="lucky-block" id="luckyBlock">?</div>
    <div class="goomba" id="goomba"></div>
    <div class="pipe" id="pipe1"></div>
    <div class="pipe" id="pipe2"></div>
    <div class="ground"></div>
    <div class="bg-mountains"></div>
    <div class="cloud" id="cloud1"></div>
    <div class="cloud" id="cloud2"></div>

    <script>
        const mario = document.getElementById("mario");
        const luckyBlock = document.getElementById("luckyBlock");
        const goomba = document.getElementById("goomba");

        const GROUND_Y = 112;
        const MARIO_W = 64;
        const MARIO_H = 92;
        const HITBOX = { x: 12, y: 5, w: 40, h: 82 };

        let posX = 100, posY = 0;
        let velX = 0, velY = 0;

        // FISICA POTENZIATA (Gioco più scattante)
        const gravity = 1.0;
        const jumpPower = 22.0;
        const accel = 1.2;
        const friction = 0.85;
        const maxSpeed = 12.0;

        let goombaX = 1000;
        let goombaDir = -1;
        const goombaSpeed = 2.5;
        const goombaRange = { min: 940, max: 1200 };

        let keys = {};
        let onGround = true;
        let isRedirecting = false;

        document.addEventListener("keydown", e => {
            const k = e.key.toLowerCase();
            keys[k] = true;
            if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(k)) {
                if (!isRedirecting) e.preventDefault();
            }
        });
        document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        const pipes = [
            { x: 850, url: 'tubo.html' },
            { x: 1250, url: 'tubo2.html' }
        ];
        const luckyRect = { x: 250, y: 350, w: 52, h: 52 };

        function getMarioRect(x, y) {
            return { x: x + HITBOX.x, y: GROUND_Y + y + HITBOX.y, w: HITBOX.w, h: HITBOX.h };
        }
        function collide(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }
        function goToPage(url) {
            if (!isRedirecting) {
                isRedirecting = true;
                window.location.href = url;
            }
        }

        let lastTime = performance.now();
        function update(dt) {
            // Normalizzazione Delta Time (60fps target)
            const d = dt / (1000 / 60);
            if (d > 3) return; // Salta frame se il tab torna in focus dopo molto tempo

            // --- GOOMBA ---
            goombaX += (goombaSpeed * goombaDir) * d;
            if (goombaX >= goombaRange.max || goombaX <= goombaRange.min) {
                goombaDir *= -1;
            }

            // --- MARIO ---
            if (keys["arrowright"] || keys["d"]) velX += accel * d;
            else if (keys["arrowleft"] || keys["a"]) velX -= accel * d;
            else velX *= Math.pow(friction, d);

            if (velX > maxSpeed) velX = maxSpeed;
            if (velX < -maxSpeed) velX = -maxSpeed;
            if (Math.abs(velX) < 0.1) velX = 0;

            posX += velX * d;

            if (posX < 0) { posX = 0; velX = 0; }
            if (posX > window.innerWidth - MARIO_W) { posX = window.innerWidth - MARIO_W; velX = 0; }

            if ((keys[" "] || keys["w"] || keys["arrowup"]) && onGround) {
                velY = jumpPower;
                onGround = false;
            }

            velY -= gravity * d;
            posY += velY * d;

            onGround = false;
            if (posY <= 0) {
                posY = 0; velY = 0; onGround = true;
            }

            let mRect = getMarioRect(posX, posY);

            // COLLISIONI
            if (collide(mRect, luckyRect)) {
                if (velY > 0 && (mRect.y + mRect.h) >= luckyRect.y && (mRect.y + mRect.h) <= luckyRect.y + 30) {
                    goToPage('lucky.html');
                } else if (velY <= 0 && mRect.y >= luckyRect.y + luckyRect.h - 20) {
                    posY = luckyRect.y + luckyRect.h - GROUND_Y - HITBOX.y;
                    velY = 0; onGround = true;
                } else {
                    if (posX + MARIO_W / 2 < luckyRect.x + luckyRect.w / 2) posX = luckyRect.x - HITBOX.x - HITBOX.w;
                    else posX = luckyRect.x + luckyRect.w - HITBOX.x;
                    velX = 0;
                }
            }

            const gRect = { x: goombaX, y: GROUND_Y, w: 44, h: 40 };
            if (collide(mRect, gRect)) {
                if (velY < 0 && mRect.y > (gRect.y + 10)) {
                    goToPage('goomba.html');
                } else {
                    posX = 100; posY = 0; velX = 0; velY = 0; onGround = true;
                }
            }

            pipes.forEach(p => {
                const pRect = { x: p.x, y: GROUND_Y, w: 80, h: 105 };
                if (collide(mRect, pRect)) {
                    if (velY <= 0 && mRect.y >= pRect.y + pRect.h - 20) {
                        posY = pRect.h - HITBOX.y;
                        velY = 0; onGround = true;
                        if (keys["s"] || keys["arrowdown"]) goToPage(p.url);
                    } else {
                        if (posX + MARIO_W / 2 < pRect.x + pRect.w / 2) posX = pRect.x - HITBOX.x - HITBOX.w;
                        else posX = pRect.x + pRect.w - HITBOX.x;
                        velX = 0;
                    }
                }
            });

            mario.style.transform = `translate3d(${posX}px, ${-posY}px, 0)`;
            goomba.style.transform = `translate3d(${goombaX}px, 0, 0)`;
        }

        function gameLoop(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;
            update(dt);
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>

</html>
