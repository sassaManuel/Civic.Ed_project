<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario World - Civic Ed</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="mario">
        <img src="sassamanuel.png" alt="Mario" width="64" height="92">
    </div>
    <div class="sun"></div>
    <div class="lucky-block" id="luckyBlock">?</div>
    <div class="goomba" id="goomba"></div>
    <div class="pipe" id="pipe1"></div>
    <div class="pipe" id="pipe2"></div>
    <div class="ground"></div>
    <div class="bg-mountains"></div>
    <div class="cloud" id="cloud1"></div>
    <div class="cloud" id="cloud2"></div>

    <script>
        const mario = document.getElementById("mario");
        const luckyBlock = document.getElementById("luckyBlock");
        const goomba = document.getElementById("goomba");
        const pipe1 = document.getElementById("pipe1");
        const pipe2 = document.getElementById("pipe2");

        const GROUND_Y = 112;
        const MARIO_W = 64;
        const MARIO_H = 92;
        const HITBOX_W = 48; // Hitbox più stretta per un gameplay più giusto

        let posX = 100, posY = 0, velY = 0;
        const gravity = 0.8;
        const jumpPower = 17;
        const moveSpeed = 7;

        let goombaX = 1000;
        let goombaDir = -1;
        const goombaSpeed = 2;
        const goombaRange = { min: 940, max: 1240 };

        let keys = {};
        let onGround = true;
        let isRedirecting = false;

        document.addEventListener("keydown", e => {
            keys[e.key.toLowerCase()] = true;
            if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) e.preventDefault();
        });
        document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        function collide(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }

        function goToPage(url) {
            if (!isRedirecting) {
                isRedirecting = true;
                window.location.href = url;
            }
        }

        function gameLoop() {
            // --- MOVIMENTO GOOMBA ---
            goombaX += goombaSpeed * goombaDir;
            if (goombaX >= goombaRange.max || goombaX <= goombaRange.min) {
                goombaDir *= -1;
            }
            goomba.style.left = goombaX + "px";

            // --- MOVIMENTO MARIO ---
            let nextX = posX;

            if (keys["arrowright"] || keys["d"]) nextX += moveSpeed;
            if (keys["arrowleft"] || keys["a"]) nextX -= moveSpeed;
            if (nextX < 0) nextX = 0;
            if (nextX > window.innerWidth - MARIO_W) nextX = window.innerWidth - MARIO_W;

            if ((keys[" "] || keys["w"] || keys["arrowup"]) && onGround) {
                velY = jumpPower;
                onGround = false;
            }

            velY -= gravity;
            posY += velY;

            // Assumiamo che non sia a terra finché non lo verifichiamo
            onGround = false;

            if (posY <= 0) {
                posY = 0;
                velY = 0;
                onGround = true;
            }

            let marioRect = {
                x: nextX + (MARIO_W - HITBOX_W) / 2,
                y: GROUND_Y + posY,
                w: HITBOX_W,
                h: MARIO_H
            };

            // 1. LUCKY BLOCK
            const luckyRect = { x: 250, y: 350, w: 52, h: 52, url: 'lucky.html' };
            if (collide(marioRect, luckyRect)) {
                // Colpito dal basso (Testa)
                if (velY > 0 && (marioRect.y + MARIO_H) >= luckyRect.y && (marioRect.y + MARIO_H) <= luckyRect.y + 25) {
                    goToPage(luckyRect.url);
                }
                // Atterra sopra
                else if (velY <= 0 && marioRect.y >= luckyRect.y + luckyRect.h - 15) {
                    posY = luckyRect.y + luckyRect.h - GROUND_Y;
                    velY = 0;
                    onGround = true;
                }
                // Collisione laterale
                else {
                    if (posX < luckyRect.x) nextX = luckyRect.x - MARIO_W + (MARIO_W - HITBOX_W) / 2;
                    else nextX = luckyRect.x + luckyRect.w - (MARIO_W - HITBOX_W) / 2;
                }
            }

            // 2. GOOMBA
            const goombaRect = { x: goombaX, y: GROUND_Y, w: 44, h: 40 };
            if (collide(marioRect, goombaRect)) {
                // Salto sopra (Schiacciato)
                if (velY < 0 && (marioRect.y + 15) > (goombaRect.y + goombaRect.h)) {
                    goToPage('goomba.html');
                } else {
                    // Colpito - Reset
                    nextX = 100;
                    posY = 0;
                    velY = 0;
                    onGround = true;
                }
            }

            // 3. PIPES
            const pipes = [
                { x: 850, url: 'tubo.html' },
                { x: 1250, url: 'tubo2.html' }
            ];

            pipes.forEach(p => {
                const pRect = { x: p.x, y: GROUND_Y, w: 80, h: 105 };
                if (collide(marioRect, pRect)) {
                    // Sopra il tubo
                    if (velY <= 0 && marioRect.y >= pRect.y + pRect.h - 15) {
                        posY = pRect.h;
                        velY = 0;
                        onGround = true;
                        if (keys["s"] || keys["arrowdown"]) goToPage(p.url);
                    } else {
                        // Muro del tubo
                        if (posX < pRect.x) nextX = pRect.x - MARIO_W + (MARIO_W - HITBOX_W) / 2;
                        else nextX = pRect.x + pRect.w - (MARIO_W - HITBOX_W) / 2;
                    }
                }
            });

            posX = nextX;
            mario.style.left = posX + "px";
            mario.style.bottom = (GROUND_Y + posY) + "px";

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>

</html>
