<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Machine - Super Mario Civic Ed</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --cabinet-dark: #111;
            --cabinet-red: #c00;
            --cabinet-red-dark: #900;
            --cabinet-border: #444;
            --glow: #ffcc00;
            --btn-red: #ff3333;
            --btn-blue: #3333ff;
            --stick: #ddd;
            --ball: #ff0000;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            /* Sfondo scuro per il locale arcade */
            display: flex;
            /* cambiato da justify-content per permettere scrolling laterale finto */
            height: 100vh;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        /* Contenitore principale che scorre a destra/sinistra */
        .room {
            display: flex;
            width: 200vw;
            height: 100vh;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Quando diamo questa classe al body, la visuale si sposta a destra */
        body.look-right .room {
            transform: translateX(-100vw);
        }

        /* --- SCENA 1: IL CABINATO ARCADE --- */
        .scene-arcade {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            /* Lo poggia in basso */
            background: url('sfondo_cabinato.png') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        /* Overlay scuro per non far perdere visibilità al cabinato */
        .scene-arcade::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* ARCADE CABINET - Ingrandito a grandezza uomo */
        .arcade-cabinet {
            width: 1100px;
            height: 100vh;
            /* Occupa tutta l'altezza dello schermo */
            max-height: none;
            /* Rimosso limite di altezza */
            background: linear-gradient(to right, var(--cabinet-dark) 0%, #222 50%, var(--cabinet-dark) 100%);
            border: 4px solid var(--cabinet-border);
            border-top: none;
            border-bottom: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        
        .arcade-cabinet::before,
        .arcade-cabinet::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40px;
            background: var(--cabinet-red-dark);
        }

        .arcade-cabinet::before {
            left: -40px;
            transform-origin: right;
            transform: perspective(1000px) rotateY(-80deg);
        }

        .arcade-cabinet::after {
            right: -40px;
            transform-origin: left;
            transform: perspective(1000px) rotateY(80deg);
        }

        
        .marquee {
            width: 92%;
            height: 90px;
            margin-top: 5px;
            /* Alzato verso il soffitto */
            background: #000;
            border: 6px solid #222;
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px var(--glow), inset 0 0 30px var(--glow);
        }

        .marquee h1 {
            color: #fff;
            text-shadow: 0 0 10px var(--glow), 0 0 20px var(--glow), 0 0 40px #f00;
            font-size: 30px;
            text-align: center;
            line-height: 1.5;
            z-index: 2;
        }

        
        .marquee::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.3) 0%, transparent 50%);
            transform: rotate(30deg);
            z-index: 1;
        }

        
        .screen-bezel {
            width: 90%;
            flex: 1;
            /* Prende lo spazio rimanente */
            margin: 15px 0;
            background: #111;
            border: 18px solid #222;
            border-radius: 25px;
            border-top-color: #333;
            border-bottom-color: #0a0a0a;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 40px #000;
        }

        
        .game-screen {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            border-radius: 15px;
            
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 10;
        }

        
        .screen-bezel::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 20;
            background-size: 100% 5px, 6px 100%;
            pointer-events: none;
        }

        .screen-glass {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 15px;
            box-shadow: inset 0 0 60px rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 40%, rgba(255, 255, 255, 0.05) 100%);
            pointer-events: none;
            z-index: 25;
        }

        
        .control-panel {
            width: 100%;
            height: 180px;
            background: linear-gradient(to bottom, var(--cabinet-red) 0%, var(--cabinet-red-dark) 100%);
            border-top: 6px solid #ff4444;
            transform-origin: top;
            transform: perspective(800px) rotateX(20deg);
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -15px 30px rgba(0, 0, 0, 0.6);
            z-index: 50;
            flex-shrink: 0;
        }

        
        .joystick-container {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            /* Forza sopra tutto */
        }

        .joystick-base {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at center, #444 0%, #111 100%);
            border-radius: 50%;
            border: 5px solid #222;
            position: absolute;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.8);
        }

        .joystick-stick-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease-out;
        }

        .joystick-stick {
            width: 24px;
            height: 70px;
            background: linear-gradient(to right, #ccc 0%, #fff 50%, #999 100%);
            position: absolute;
            bottom: 50%;
            border-radius: 12px;
            z-index: 5;
            transform-origin: bottom center;
        }

        .joystick-ball {
            width: 45px;
            height: 45px;
            background: radial-gradient(circle at 30% 30%, #ff8888 0%, var(--ball) 60%, #800 100%);
            border-radius: 50%;
            position: absolute;
            top: -45px;
            left: -10px;
            box-shadow: inset -6px -6px 18px rgba(0, 0, 0, 0.5), 0 12px 12px rgba(0, 0, 0, 0.4);
            z-index: 6;
        }

        
        .joystick-left {
            transform: rotate(-25deg);
        }

        .joystick-right {
            transform: rotate(25deg);
        }

        .joystick-up {
            transform: rotateX(30deg) translateY(-20px);
        }

        
        .buttons-container {
            display: flex;
            gap: 40px;
            position: relative;
            top: -20px;
            transform: rotate(-10deg);
            z-index: 50;
            /* Forza sopra tutto */
        }

        .arcade-btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .arcade-btn-base {
            width: 80px;
            height: 80px;
            background: #222;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.8), inset 0 2px 6px rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .arcade-btn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            box-shadow: inset -2px -6px 12px rgba(0, 0, 0, 0.3), 0 6px 6px rgba(0, 0, 0, 0.5);
            transition: all 0.05s ease;
        }

        .arcade-btn.red {
            background: radial-gradient(circle at 30% 30%, #ff8888 0%, var(--btn-red) 60%, #a00 100%);
        }

        .arcade-btn.blue {
            background: radial-gradient(circle at 30% 30%, #8888ff 0%, var(--btn-blue) 60%, #00a 100%);
        }

        
        .arcade-btn.pressed {
            top: 10px;
            box-shadow: inset -2px -2px 12px rgba(0, 0, 0, 0.5), 0 0px 3px rgba(0, 0, 0, 0.5);
        }

        .btn-label {
            color: #fff;
            font-size: 14px;
            text-shadow: 0 2px 3px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        
        .start-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            z-index: 50;
            text-shadow: 0 0 12px #000;
            pointer-events: none;
            animation: pulse 1s infinite alternate, fadeout 2s forwards;
            animation-delay: 0s, 2s;
        }

        .start-overlay h2 {
            font-size: 32px;
        }

        .start-overlay p {
            font-size: 18px;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
                text-shadow: 0 0 25px #ff0;
            }
        }

        @keyframes fadeout {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* --- SCENA 2: MAXISCHERMO A DESTRA --- */
        .scene-bigscreen {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a2a 0%, #000 100%);
            position: relative;
        }

        /* Struttura fisica del maxischermo */
        .big-screen-frame {
            width: 95vw;
            height: 95vh;
            background: #111;
            border: 15px solid #222;
            border-radius: 12px;
            box-shadow: 0 0 100px rgba(0, 255, 255, 0.1), inset 0 0 30px #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .big-screen-header {
            height: 50px;
            background: #151515;
            border-bottom: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff3333;
            font-size: 18px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .big-screen-iframe {
            width: 100%;
            flex: 1;
            border: none;
            background: #000;
            border-radius: 0 0 12px 12px;
        }

        /* Riflessi maxischermo */
        .big-screen-frame::after {
            content: '';
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="room">
        <!-- SCENA DI SINISTRA: L'ARCADE -->
        <div class="scene-arcade">
            <div class="arcade-cabinet">

                <div class="marquee">
                    <h1>SUPER MARIO<br>EDUCAZIONE CIVICA</h1>
                </div>

                <div class="screen-bezel">
                    <iframe id="gameIframe" class="game-screen" src="game.html" allowfullscreen></iframe>
                    <div class="screen-glass"></div>
                </div>

                <div class="control-panel">
                    
                    <div class="joystick-container">
                        <div class="joystick-base"></div>
                        <div class="joystick-stick-wrapper" id="joystick">
                            <div class="joystick-stick">
                                <div class="joystick-ball"></div>
                            </div>
                        </div>
                    </div>

                    
                    <div class="buttons-container">
                        <div class="arcade-btn-wrapper">
                            <div class="arcade-btn-base">
                                <div class="arcade-btn blue" id="btn-action"></div>
                            </div>
                            <span class="btn-label">TUBO (S/⬇️)</span>
                        </div>
                        <div class="arcade-btn-wrapper" style="margin-top: -3px;">
                            <div class="arcade-btn-base">
                                <div class="arcade-btn red" id="btn-jump"></div>
                            </div>
                            <span class="btn-label">SALTA (SPACE/W/⬆️)</span>
                        </div>
                    </div>
                </div>



                <div class="start-overlay">
                    <h2>CLICK TO START</h2>
                    <p>Use W A S D or Arrows</p>
                </div>

            </div>
        </div>

        <!-- SCENA DI DESTRA: IL MAXISCHERMO -->
        <div class="scene-bigscreen">
            <div class="big-screen-frame">

                <iframe id="bigScreenIframe" class="big-screen-iframe" src="about:blank"></iframe>
            </div>
        </div>
    </div>

    <script>
        const joystick = document.getElementById('joystick');
        const btnJump = document.getElementById('btn-jump');
        const btnAction = document.getElementById('btn-action');

        // Ascoltatore dei messaggi provenienti dall'iframe (game.html, o i moduli sul maxischermo)
        window.addEventListener('message', function (e) {
            if (e.data && e.data.type) {
                if (e.data.type === 'keydown') {
                    handleKey(e.data.key, true);
                } else if (e.data.type === 'keyup') {
                    handleKey(e.data.key, false);
                } else if (e.data.type === 'navigate') {
                    // C'è stata una navigazione (Lucky block, Tubo, Goomba)
                    // Carichiamo l'URL nel maxischermo a destra
                    document.getElementById('bigScreenIframe').src = e.data.url;
                    // Giriamo la visuale a destra
                    document.body.classList.add('look-right');
                } else if (e.data.type === 'backToGame') {
                    // L'utente ha cliccato "Torna al Gioco" nel maxischermo
                    // Giriamo la visuale a sinistra
                    document.body.classList.remove('look-right');
                    // Svuotiamo l'iframe del maxischermo e riavviamo il gioco dopo l'animazione
                    setTimeout(() => {
                        document.getElementById('bigScreenIframe').src = 'about:blank';
                        // Comunichiamo al gioco di resettarsi/sbloccarsi
                        document.getElementById('gameIframe').contentWindow.postMessage({ type: 'resume' }, '*');
                        document.getElementById('gameIframe').focus();
                    }, 1200);
                }
            }
        });

        // Consenti all'arcade di inoltrare la pressione dei tasti all'iframe 
        document.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'w', 'a', 's', 'd'].includes(e.key) && !e.ctrlKey && !e.altKey && !e.metaKey) {
                e.preventDefault();
            }
            handleKey(e.key.toLowerCase(), true);
            document.getElementById('gameIframe').focus();
        });

        document.addEventListener('keyup', e => {
            handleKey(e.key.toLowerCase(), false);
        });

        // Funzione per animare il joystick e i bottoni
        function handleKey(key, isDown) { 
            // Mappatura movimenti Joystick (Rimossa la direzione 'GIÙ' o 'S' dal joystick)
            if (['arrowleft', 'a'].includes(key)) {
                if (isDown) joystick.className = 'joystick-stick-wrapper joystick-left';
                else joystick.className = 'joystick-stick-wrapper';
            }
            else if (['arrowright', 'd'].includes(key)) {
                if (isDown) joystick.className = 'joystick-stick-wrapper joystick-right';
                else joystick.className = 'joystick-stick-wrapper';
            }
            else if (['arrowup', 'w'].includes(key)) {
                if (isDown) joystick.className = 'joystick-stick-wrapper joystick-up';
                else joystick.className = 'joystick-stick-wrapper';
            }

            // Animazione Bottoni
            
            if ([' ', 'arrowup', 'w'].includes(key)) {
                isDown ? btnJump.classList.add('pressed') : btnJump.classList.remove('pressed');
            }
            
            if (['s', 'arrowdown'].includes(key)) {
                isDown ? btnAction.classList.add('pressed') : btnAction.classList.remove('pressed');
            }
        }
    </script>
</body>

</html>
