<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario World - Civic Ed</title>
    <!-- Caricamento del font "pixelato" per richiamare lo stile dei videogiochi retro -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Collegamento al file CSS esterno per gli stili grafici e le animazioni -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-world">
        <!-- 
            ELEMENTI DEL GIOCO:
            Div e immagini che rappresentano gli oggetti nel mondo di gioco.
            Tutti questi elementi verranno manipolati via JavaScript o CSS.
        -->
        <div id="mario">
            <!-- L'immagine di Mario (sassamanuel.png) -->
            <img src="sassamanuel.png" alt="Mario" width="64" height="92">
        </div>

        <!-- Elementi ambientali -->
        <div class="sun"></div>
        <!-- Blocco fortunato: porta alla pagina lucky.html -->
        <div class="lucky-block" id="luckyBlock">?</div>
        <!-- Nemico Goomba: se colpito di lato resetta, se colpito dall'alto porta a goomba.html -->
        <div class="goomba" id="goomba"></div>
        <!-- Piante Piranha ("Pecorino Bucccianera") -->
        <div class="piranha-plant" id="piranha1"></div>
        <div class="piranha-plant" id="piranha2"></div>

        <!-- Tubi verdi: se ci si preme "S" o "Freccia Giù" portano ad altre pagine -->
        <div class="pipe" id="pipe1"></div>
        <div class="pipe" id="pipe2"></div>

        <!-- Blocco scale prima della bandiera -->
        <div class="stair" style="left: 3450px; width: 50px; height: 50px;"></div>
        <div class="stair" style="left: 3500px; width: 50px; height: 100px;"></div>
        <div class="stair" style="left: 3550px; width: 50px; height: 150px;"></div>
        <div class="stair" style="left: 3600px; width: 50px; height: 200px;"></div>

        <!-- Bandiera di fine livello -->
        <div class="flagpole" id="flagpole">
            <div class="flag" id="flag"></div>
        </div>

        <!-- Sfondi e decorazioni -->
        <div class="ground"></div>
        <div class="bg-mountains"></div>
        <div class="cloud" id="cloud1"></div>
        <div class="cloud" id="cloud2"></div>
    </div>

    <script>
        /**
         * LOGICA DEL GIOCO (JAVASCRIPT)
         * Gestisce il movimento di Mario, la fisica, le collisioni e la navigazione tra le pagine.
         */

        // Riferimenti agli elementi DOM
        const gameWorld = document.getElementById("game-world");
        const mario = document.getElementById("mario");
        const luckyBlock = document.getElementById("luckyBlock");
        const goomba = document.getElementById("goomba");
        const flag = document.getElementById("flag");

        // Costanti di gioco: dimensioni e parametri fisici
        const GROUND_Y = 112; // Altezza del terreno dal fondo
        const MARIO_W = 64;   // Larghezza di Mario
        const MARIO_H = 92;   // Altezza di Mario
        const HITBOX = { x: 12, y: 5, w: 40, h: 82 }; // Area di collisione reale (più piccola dell'immagine)

        // Stato di Mario: posizione e velocità
        let posX = 100, posY = 0;
        let velX = 0, velY = 0;

        // PARAMETRI FISICI: Regolano come Mario si muove (salto, gravità, attrito)
        const gravity = 1.0;      // Forza che spinge Mario verso il basso
        const jumpPower = 22.0;   // Forza iniziale del salto
        const accel = 1.2;        // Accelerazione laterale
        const friction = 0.85;    // Attrito che rallenta Mario quando non si premono tasti
        const maxSpeed = 12.0;    // Velocità massima raggiungibile

        // Stato del Goomba (il nemico che cammina)
        let goombaX = 1000;
        let goombaDir = -1;
        const goombaSpeed = 2.5;
        const goombaRange = { min: 940, max: 1200 }; // Area in cui il Goomba pattuglia

        // Input dell'utente
        let keys = {};
        let onGround = true;      // Indica se Mario sta toccando terra
        let isRedirecting = false; // Impedisce molteplici redirect contemporanei
        let marioFacingRight = true; // Lato verso cui guarda Mario

        // Stato della bandiera di fine livello
        const FLAGPOLE_X = 3800; // Spostata molto più avanti
        let flagHit = false;
        let flagY = 320; // Posizione Y della bandiera (parte dall'alto)

        // Posizione delle scale per le collisioni
        const stairs = [
            { x: 3450, w: 50, h: 50 },
            { x: 3500, w: 50, h: 100 },
            { x: 3550, w: 50, h: 150 },
            { x: 3600, w: 50, h: 200 }
        ];

        // Gestione degli eventi da tastiera
        document.addEventListener("keydown", e => {
            const k = e.key.toLowerCase();
            keys[k] = true;
            // Preveniamo lo scrolling della pagina con i tasti freccia/spazio
            if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(k)) {
                if (!isRedirecting) e.preventDefault();
            }
            if (window.parent) window.parent.postMessage({ type: 'keydown', key: k }, '*');
        });
        document.addEventListener("keyup", e => {
            const k = e.key.toLowerCase();
            keys[k] = false;
            if (window.parent) window.parent.postMessage({ type: 'keyup', key: k }, '*');
        });

        // Mappatura dei tubi e delle loro destinazioni
        const pipes = [
            { x: 850, url: 'tubo.html' },
            { x: 1250, url: 'tubo2.html' }
        ];

        // Stato e posizione delle Piante Piranha
        const piranhas = [
            { id: "piranha1", x: 850, y: 40, timer: 0 },
            { id: "piranha2", x: 1250, y: 40, timer: 1500 } // sfasata di mezzo ciclo
        ];

        // Posizione del blocco fortunato (?)
        const luckyRect = { x: 250, y: 350, w: 52, h: 52 };

        /**
         * FUNZIONI DI UTILITÀ
         */

        // Calcola il rettangolo di collisione di Mario in base alla sua posizione corrente
        function getMarioRect(x, y) {
            return { x: x + HITBOX.x, y: GROUND_Y + y + HITBOX.y, w: HITBOX.w, h: HITBOX.h };
        }

        // Determina se due rettangoli si sovrappongono (collisione AABB)
        function collide(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }

        // Gestisce il cambio di pagina verso i moduli di Educazione Civica
        function goToPage(url) {
            if (!isRedirecting) {
                isRedirecting = true;
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type: 'navigate', url: url }, '*');
                } else {
                    window.location.href = url;
                }
            }
        }

        window.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'resume') {
                window.location.reload();
            }
        });

        /**
         * CICLO DI AGGIORNAMENTO (UPDATE)
         * Questa funzione viene chiamata ad ogni frame per calcolare i movimenti.
         */
        let lastTime = performance.now();
        function update(dt) {
            // Normalizzazione Delta Time per garantire la stessa velocità su monitor con diverse frequenze
            const d = dt / (1000 / 60);
            if (d > 3) return; // Protezione se il computer subisce un forte rallentamento

            // Calcolo cameraX
            let cameraX = posX - window.innerWidth / 2 + MARIO_W / 2;
            if (cameraX < 0) cameraX = 0;
            // limite massimo: dove inizia la bandiera (più o meno)
            if (cameraX > 4000 - window.innerWidth) cameraX = Math.max(0, 4000 - window.innerWidth);
"   "
            if (flagHit) {
                // Mario si è attaccato al palo
                if (!onGround) {
                    posY -= 4 * d; // Scivola giù dal palo
                    if (posY <= 0) {
                        posY = 0; onGround = true;
                    }
                }

                // La bandiera si abbassa insieme a Mario
                flagY = posY + 20; // La bandiera segue Mario
                if (flagY <= 20) {
                    flagY = 20;
                }

                if (onGround) {
                    goToPage('vittoria.html'); // Quando arrivano giù, cambia pagina
                }

                // Applica animazione bandiera e traslazioni
                const marioImgElem = document.querySelector("#mario img");
                let imgTransform = "scaleX(1) ";
                if (!marioFacingRight) imgTransform = "scaleX(-1) ";
                let tilt = marioFacingRight ? "-25deg" : "25deg";
                if (marioImgElem) marioImgElem.style.transform = imgTransform + `translateY(10px) rotate(${tilt})`;

                flag.style.bottom = `${flagY}px`;
                mario.style.transform = `translate3d(${posX}px, ${-posY}px, 0)`;
                gameWorld.style.transform = `translate3d(${-cameraX}px, 0, 0)`;
                return; // Blocchiamo il resto dell'aggiornamento
            }

            // --- AGGIORNAMENTO GOOMBA ---
            goombaX += (goombaSpeed * goombaDir) * d;
            if (goombaX >= goombaRange.max || goombaX <= goombaRange.min) {
                goombaDir *= -1; // Cambia direzione se raggiunge i limiti del percorso
            }

            // --- MOVIMENTO ORIZZONTALE MARIO ---
            if (keys["arrowright"] || keys["d"]) velX += accel * d;
            else if (keys["arrowleft"] || keys["a"]) velX -= accel * d;
            else velX *= Math.pow(friction, d); // Applica attrito

            // Limita la velocità massima
            if (velX > maxSpeed) velX = maxSpeed;
            if (velX < -maxSpeed) velX = -maxSpeed;
            if (Math.abs(velX) < 0.1) velX = 0;

            posX += velX * d;

            // Limiti laterali della finestra (Mario non può uscire dallo schermo a sinistra)
            if (posX < 0) { posX = 0; velX = 0; }
            if (posX > 4000 - MARIO_W) { posX = 4000 - MARIO_W; velX = 0; }

            // Ricalcolo cameraX dopo il movimento
            cameraX = posX - window.innerWidth / 2 + MARIO_W / 2;
            if (cameraX < 0) cameraX = 0;
            if (cameraX > 4000 - window.innerWidth) cameraX = Math.max(0, 4000 - window.innerWidth);

            // --- SALTO ---
            if ((keys[" "] || keys["w"] || keys["arrowup"]) && onGround) {
                velY = jumpPower;
                onGround = false;
            }

            // --- GRAVITÀ ---
            velY -= gravity * d;
            posY += velY * d;

            // Collisione con il terreno
            onGround = false;
            if (posY <= 0) {
                posY = 0; velY = 0; onGround = true;
            }

            // Calcolo del rettangolo attuale di Mario per le collisioni con gli oggetti
            let mRect = getMarioRect(posX, posY);

            // --- COLLISIONE CON LUCKY BLOCK ---
            if (collide(mRect, luckyRect)) {
                // Se Mario colpisce il blocco dal basso (velY > 0)
                if (velY > 0 && (mRect.y + mRect.h) >= luckyRect.y && (mRect.y + mRect.h) <= luckyRect.y + 30) {
                    goToPage('lucky.html'); // Vai alla pagina della sicurezza digitale
                } else if (velY <= 0 && mRect.y >= luckyRect.y + luckyRect.h - 20) {
                    // Mario ci atterra sopra
                    posY = luckyRect.y + luckyRect.h - GROUND_Y - HITBOX.y;
                    velY = 0; onGround = true;
                } else {
                    // Collisione laterale
                    if (posX + MARIO_W / 2 < luckyRect.x + luckyRect.w / 2) posX = luckyRect.x - HITBOX.x - HITBOX.w;
                    else posX = luckyRect.x + luckyRect.w - HITBOX.x;
                    velX = 0;
                }
            }

            // --- COLLISIONE CON IL GOOMBA ---
            const gRect = { x: goombaX, y: GROUND_Y, w: 44, h: 40 };
            if (collide(mRect, gRect)) {
                // Se Mario salta sopra il Goomba (uccidendolo/interagendo)
                if (velY < 0 && mRect.y > (gRect.y + 10)) {
                    goToPage('goomba.html'); // Vai alla pagina dell'economia e responsabilità
                } else {
                    // Se Mario tocca il Goomba lateralmente, il gioco si resetta
                    posX = 100; posY = 0; velX = 0; velY = 0; onGround = true;
                }
            }

            // --- PIRANHA PLANTS (Fisica, Disegno e Collisioni) ---
            piranhas.forEach(p => {
                p.timer += dt;
                const cycle = 10000;
                const phase = (p.timer % cycle) / cycle;
                let offsetY = 0;

                // Animazione di uscita dal tubo
                if (phase < 0.2) offsetY = (phase / 0.2) * 120;
                else if (phase < 0.5) offsetY = 120;
                else if (phase < 0.7) offsetY = Math.max(0, (1 - (phase - 0.5) / 0.2) * 120);

                p.y = 10 + offsetY; // da 10 a 130

                const elem = document.getElementById(p.id);
                if (elem) elem.style.transform = `translate3d(${p.x}px, ${-p.y}px, 0)`;

                // Collisione (se la pianta è abbastanza fuori)
                if (offsetY > 10) {
                    const pRect = { x: p.x, y: GROUND_Y + p.y, w: 100, h: 100 };
                    if (collide(mRect, pRect)) {
                        // Muore, torna all'inizio
                        posX = 100; posY = 0; velX = 0; velY = 0; onGround = true;
                    }
                }
            });

            // --- COLLISIONE CON I TUBI ---
            pipes.forEach(p => {
                const pRect = { x: p.x, y: GROUND_Y, w: 100, h: 105 };
                if (collide(mRect, pRect)) {
                    if (velY <= 0 && mRect.y >= pRect.y + pRect.h - 20) {
                        // Se Mario è sopra il tubo
                        posY = pRect.h - HITBOX.y;
                        velY = 0; onGround = true;
                        // Premendo GIÙ si entra nel tubo
                        if (keys["s"] || keys["arrowdown"]) goToPage(p.url);
                    } else {
                        // Collisione laterale con il tubo (funge da muro)
                        if (posX + MARIO_W / 2 < pRect.x + pRect.w / 2) posX = pRect.x - HITBOX.x - HITBOX.w;
                        else posX = pRect.x + pRect.w - HITBOX.x;
                        velX = 0;
                    }
                }
            });

            // --- COLLISIONE CON LE SCALE ---
            stairs.forEach(s => {
                const sRect = { x: s.x, y: GROUND_Y, w: s.w, h: s.h };
                if (collide(mRect, sRect)) {
                    if (velY <= 0 && mRect.y >= sRect.y + sRect.h - 20) {
                        posY = sRect.h - HITBOX.y;
                        velY = 0; onGround = true;
                    } else {
                        // Collisione laterale
                        if (posX + MARIO_W / 2 < sRect.x + sRect.w / 2) posX = sRect.x - HITBOX.x - HITBOX.w;
                        else posX = sRect.x + sRect.w - HITBOX.x;
                        velX = 0;
                    }
                }
            });

            // --- COLLISIONE CON FLAGPOLE (Fine Livello) ---
            const flagpoleRect = { x: FLAGPOLE_X, y: GROUND_Y, w: 20, h: 350 };
            if (collide(mRect, flagpoleRect) && !flagHit) {
                flagHit = true;
                posX = FLAGPOLE_X - MARIO_W + 10;
                velX = 0;
                velY = 0;
            }

            // --- ANIMAZIONI IMMAGINE MARIO (CSS) ---
            let imgTransform = "";
            let isMoving = Math.abs(velX) > 0.5;

            // Direzione in base al movimento e tasti
            if (velX < -0.1 || keys["arrowleft"] || keys["a"]) marioFacingRight = false;
            else if (velX > 0.1 || keys["arrowright"] || keys["d"]) marioFacingRight = true;

            // Specchia l'immagine se rivolta a sinistra
            if (!marioFacingRight) imgTransform += "scaleX(-1) ";

            if (flagHit) {
                // Attaccato alla corda: ruotato come se si stesse stringendo e leggermente traslato
                let tilt = marioFacingRight ? "-25deg" : "25deg";
                imgTransform += `translateY(10px) rotate(${tilt}) `;
            } else if (!onGround) {
                // Salto: si inclina per simulare lo slancio (considerando il mirror)
                let tilt = marioFacingRight ? "-15deg" : "15deg";
                imgTransform += `rotate(${tilt}) `;
            } else if (isMoving) {
                // Corsa: movimenti di oscillazione (su/giù e dondolamento) calcolati dinamicamente
                // usando la funzione seno rispetto alla posizione X, crea un movimento naturalissimo!
                let bounce = Math.abs(Math.sin(posX * 0.05)) * -8;
                let tilt = Math.sin(posX * 0.05) * 15;
                if (!marioFacingRight) tilt = -tilt; // Inverti il dondolio per evitare l'effetto opposto col mirror
                imgTransform += `translateY(${bounce}px) rotate(${tilt}deg) `;
            } else {
                // Fermo
                imgTransform += "translateY(0) rotate(0deg) ";
            }

            const marioImgElem = document.querySelector("#mario img");
            if (marioImgElem) marioImgElem.style.transform = imgTransform;


            // --- APPLICAZIONE TRASFORMAZIONI GRAFICHE ---
            // Usiamo translate3d per attivare l'accelerazione hardware della GPU
            mario.style.transform = `translate3d(${posX}px, ${-posY}px, 0)`;
            goomba.style.transform = `translate3d(${goombaX}px, 0, 0)`;
            gameWorld.style.transform = `translate3d(${-cameraX}px, 0, 0)`;
        }

        /**
         * LOOP PRINCIPALE
         * requestAnimationFrame ottimizza le prestazioni sincronizzandosi con il refresh rate del monitor.
         */
        function gameLoop(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;
            update(dt);
            requestAnimationFrame(gameLoop);
        }

        // Avvio del gioco
        requestAnimationFrame(gameLoop);
    </script>
</body>

</html>
